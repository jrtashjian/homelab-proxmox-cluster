- name: Ensure sudo is installed
  ansible.builtin.apt:
    name: sudo
    state: present
    update_cache: true

- name: Create the ansible user account
  ansible.builtin.user:
    name: "{{ ansible_user_name }}"
    password: "{{ ansible_user_password | password_hash('sha512') }}"
    groups: sudo
    append: true
    shell: /bin/bash
    create_home: true
    state: present

- name: Add SSH public key for passwordless login
  ansible.posix.authorized_key:
    user: "{{ ansible_user_name }}"
    key: "{{ ansible_user_ssh_public_key }}"
    state: present

- name: Allow passwordless sudo for the ansible user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ ansible_user_name }}"
    content: "{{ ansible_user_name }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"